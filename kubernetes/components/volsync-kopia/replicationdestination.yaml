---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/volsync.backube/replicationdestination_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: "${APP}-dst"
spec:
  # Set VOLSYNC_DST_PAUSED=true in an app's ks.yaml postBuild.substitute
  # to disable the bootstrap restore (no PVCs created, no mover jobs).
  # Required for apps whose dataset is too large to safely restore
  # alongside live data (e.g. nextcloud at 385 GB on a 1.8 TiB cluster).
  paused: ${VOLSYNC_DST_PAUSED:=false}
  trigger:
    manual: restore-once
  kopia:
    accessModes:
      - ${VOLSYNC_ACCESSMODES:=ReadWriteOnce}
    cacheAccessModes:
      - ${VOLSYNC_CACHE_ACCESSMODES:=ReadWriteOnce}
    cacheCapacity: ${VOLSYNC_CACHE_CAPACITY:=8Gi}
    cacheStorageClassName: ${VOLSYNC_CACHE_STORAGECLASS:=ceph-block}
    capacity: ${VOLSYNC_CAPACITY:=5Gi}
    cleanupCachePVC: true
    cleanupTempPVC: true
    copyMethod: Snapshot
    enableFileDeletion: true
    moverSecurityContext:
      runAsUser: ${VOLSYNC_PUID:=568}
      runAsGroup: ${VOLSYNC_PGID:=568}
      fsGroup: ${VOLSYNC_PGID:=568}
    moverVolumes:
      - mountPath: repository
        volumeSource:
          nfs:
            path: /mnt/rust/volsync/kopia
            server: 192.168.10.98
    repository: ${APP}-volsync-kopia-secret
    sourceIdentity:
      sourceName: ${APP}
    storageClassName: ${VOLSYNC_STORAGECLASS:=ceph-block}
    volumeSnapshotClassName: ${VOLSYNC_SNAPSHOTCLASS:=csi-ceph-blockpool}
