---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-volsync-kopia"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: "${APP}-volsync-kopia-secret"
    template:
      data:
        # Reuse the existing restic password as kopia password to avoid
        # requiring a new 1Password item. Same security model — a single
        # secret protects all backups for this cluster.
        KOPIA_PASSWORD: "{{ .RESTIC_PASSWORD }}"
        KOPIA_REPOSITORY: filesystem:///mnt/repository
  dataFrom:
    - extract:
        key: volsync
