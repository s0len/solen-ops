---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/volsync.backube/replicationsource_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: ${APP}
spec:
  sourcePVC: ${CLAIM:=${APP}}
  trigger:
    schedule: "${VOLSYNC_SCHEDULE:=0 * * * *}"
  kopia:
    accessModes:
      - ${VOLSYNC_SNAP_ACCESSMODES:=ReadWriteOnce}
    cacheAccessModes:
      - ${VOLSYNC_CACHE_ACCESSMODES:=ReadWriteOnce}
    cacheCapacity: ${VOLSYNC_CACHE_CAPACITY:=8Gi}
    cacheStorageClassName: ${VOLSYNC_CACHE_STORAGECLASS:=ceph-block}
    compression: zstd-fastest
    copyMethod: Snapshot
    moverSecurityContext:
      runAsUser: ${VOLSYNC_PUID:=568}
      runAsGroup: ${VOLSYNC_PGID:=568}
      fsGroup: ${VOLSYNC_PGID:=568}
    moverVolumes:
      - mountPath: repository
        volumeSource:
          nfs:
            path: /mnt/rust/volsync/kopia
            server: 192.168.10.98
    parallelism: 2
    repository: ${APP}-volsync-kopia-secret
    retain:
      hourly: 24
      daily: 14
    storageClassName: ${VOLSYNC_STORAGECLASS:=ceph-block}
    volumeSnapshotClassName: ${VOLSYNC_SNAPSHOTCLASS:=csi-ceph-blockpool}
