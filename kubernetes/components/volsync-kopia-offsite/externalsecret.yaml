---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-volsync-kopia-r2"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: "${APP}-volsync-kopia-r2-secret"
    template:
      data:
        # Shared kopia repo at Cloudflare R2 — per-app separation via
        # sourceIdentity.sourceName, single repo for dedup across apps.
        KOPIA_PASSWORD: "{{ .RESTIC_PASSWORD }}"
        KOPIA_REPOSITORY: "s3://backup/kopia-r2/"
        AWS_S3_ENDPOINT: "https://8fdaa691408667c1914ee791977b10fe.r2.cloudflarestorage.com"
        AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY }}"
  dataFrom:
    - extract:
        key: volsync
