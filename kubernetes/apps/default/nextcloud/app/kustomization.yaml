---
# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
  - ./helmrepository.yaml
  - ./httproute.yaml
configMapGenerator:
  - name: nextcloud-icc-patch
    files:
      - ./resources/icc-patch/icc-patch.sh
      - ./resources/icc-patch/Image.php
      - ./resources/icc-patch/HEIC.php
    options:
      disableNameSuffixHash: true
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled
