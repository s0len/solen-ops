---
# yaml-language-server: $schema=https://github.com/fluxcd-community/flux2-schemas/raw/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app nextcloud
  namespace: &namespace default
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../../../components/gatus/external
    - ../../../../components/volsync-kopia
    - ../../../../components/volsync-kopia-offsite
  dependsOn:
    - name: cloudnative-pg-cluster
      namespace: database
    - name: dragonfly-cluster
      namespace: database
    - name: onepassword
      namespace: external-secrets
  path: ./kubernetes/apps/default/nextcloud/app
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
  timeout: 15m
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 600Gi
      VOLSYNC_CACHE_CAPACITY: 32Gi
      VOLSYNC_SCHEDULE: "0 1 * * *"
      # Bootstrap restore is intentionally enabled: nextcloud is the most
      # critical app and should come back online automatically after a
      # cluster rebuild. VolSync uses status.lastManualSync to avoid
      # spurious re-triggers — as long as the RD object is not deleted,
      # the restore fires exactly once on fresh deploys. If you need to
      # do a manual `kubectl delete` of the RD for any reason, expect
      # ~400 GiB of Ceph churn for ~5h while it rebuilds.
      GATUS_SUBDOMAIN: cloud
      GATUS_PATH: /status.php
