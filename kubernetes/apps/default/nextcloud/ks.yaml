---
# yaml-language-server: $schema=https://github.com/fluxcd-community/flux2-schemas/raw/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app nextcloud
  namespace: &namespace default
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../../../components/gatus/external
    - ../../../../components/volsync-kopia
    - ../../../../components/volsync-kopia-offsite
  patches:
    # Nextcloud is 385 GB; the bootstrap restore-once destination would
    # consume ~400 GiB of Ceph for ~5h every time the RD is (re)created.
    # Backups are still in place via the volsync-kopia ReplicationSource +
    # offsite R2; restores can be re-enabled by reverting this patch.
    - target:
        group: volsync.backube
        version: v1alpha1
        kind: ReplicationDestination
        name: nextcloud-dst
      patch: |
        $patch: delete
        apiVersion: volsync.backube/v1alpha1
        kind: ReplicationDestination
        metadata:
          name: nextcloud-dst
  dependsOn:
    - name: cloudnative-pg-cluster
      namespace: database
    - name: dragonfly-cluster
      namespace: database
    - name: onepassword
      namespace: external-secrets
  path: ./kubernetes/apps/default/nextcloud/app
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
  timeout: 15m
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 400Gi
      VOLSYNC_CACHE_CAPACITY: 32Gi
      VOLSYNC_SCHEDULE: "0 1 * * *"
      GATUS_SUBDOMAIN: cloud
      GATUS_PATH: /status.php
