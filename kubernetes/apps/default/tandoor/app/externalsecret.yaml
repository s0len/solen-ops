---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tandoor
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: tandoor-secret
    template:
      data:
        SECRET_KEY: "{{ .TANDOOR_SECRET_KEY }}"
        POSTGRES_HOST: "postgres16-rw.database.svc.cluster.local"
        POSTGRES_PORT: "5432"
        POSTGRES_USER: &dbuser "{{ .TANDOOR_POSTGRES_USER }}"
        POSTGRES_PASSWORD: &dbpass "{{ .TANDOOR_POSTGRES_PASSWORD }}"
        POSTGRES_DB: &dbname "{{ .TANDOOR_POSTGRES_DB }}"
        INIT_POSTGRES_DBNAME: *dbname
        INIT_POSTGRES_HOST: postgres16-rw.database.svc.cluster.local
        INIT_POSTGRES_USER: *dbuser
        INIT_POSTGRES_PASS: *dbpass
        INIT_POSTGRES_SUPER_PASS: "{{ .CNPG_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: cloudnative-pg
      rewrite:
        - regexp:
            source: "(.*)"
            target: "CNPG_$1"
    - extract:
        key: tandoor
      rewrite:
        - regexp:
            source: "(.*)"
            target: "TANDOOR_$1"
