---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app zipline
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      zipline:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom: &envFrom
              - secretRef:
                  name: zipline-secret
        containers:
          app:
            image:
              repository: ghcr.io/diced/zipline
              tag: 4.4.2@sha256:a435038f6163c12ec572f3796f53123c6459b76b52c49cfbbdcdc31b3801c640
            env:
              TZ: ${TIMEZONE}
              CORE_RETURN_HTTPS_URLS: true
              CORE_DEFAULT_DOMAIN: "zipline.${SECRET_DOMAIN}"
              DATASOURCE_TYPE: local
              DATASOURCE_LOCAL_DIRECTORY: /data/uploads
              INVITES_ENABLED: false
              FEATURES_ROBOTS_TXT: false
              FEATURES_USER_REGISTRATION: false
              FEATURES_VERSION_CHECKING: false
              FILES_ROUTE: /u
              FILES_LENGTH: 6
              FILES_DEFAULT_FORMAT: "date"
              FILES_DISABLED_EXTENSIONS: "ps1,pdf,bat,exe,sh,fish"
              FILES_DEFAULT_DATE_FORMAT: "YYYY-MM-DD_HH-mm-ss"
              FILES_REMOVE_GPS_METADATA: true
              URLS_ROUTE: /g
              URLS_LENGTH: 6
              WEBSITE_TITLE: Zipline
            envFrom: *envFrom
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 5m
                memory: 256Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: *app
        ports:
          http:
            port: 3000
    route:
      app:
        hostnames:
          - "zipline.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
