---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app teslamate
  namespace: default
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3

  values:
    controllers:
      teslamate:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
            envFrom: &envFrom
              - secretRef:
                  name: teslamate-secret
          init-extensions:
            image:
              repository: ghcr.io/cloudnative-pg/postgresql
              tag: "16.14@sha256:9f917c9f05732db5c40f6bc72be4e7d34705f205c75761f0d0d63e1f77e932ab"
            command: ["sh", "-c"]
            args:
              - |
                PGPASSWORD="$INIT_POSTGRES_SUPER_PASS" psql -h "$DATABASE_HOST" -U postgres -d "$DATABASE_NAME" \
                  -c "CREATE EXTENSION IF NOT EXISTS cube WITH SCHEMA public;" \
                  -c "CREATE EXTENSION IF NOT EXISTS earthdistance WITH SCHEMA public;" \
                  -c "ALTER FUNCTION ll_to_earth SET search_path = public;" \
                  -c "ALTER FUNCTION earth() OWNER TO $DATABASE_USER;" \
                  -c "ALTER FUNCTION earth_box(earth, float8) OWNER TO $DATABASE_USER;" \
                  -c "ALTER FUNCTION earth_distance(earth, earth) OWNER TO $DATABASE_USER;" \
                  -c "ALTER FUNCTION gc_to_sec(float8) OWNER TO $DATABASE_USER;" \
                  -c "ALTER FUNCTION latitude(earth) OWNER TO $DATABASE_USER;" \
                  -c "ALTER FUNCTION longitude(earth) OWNER TO $DATABASE_USER;" \
                  -c "ALTER FUNCTION ll_to_earth(float8, float8) OWNER TO $DATABASE_USER;" \
                  -c "ALTER FUNCTION sec_to_gc(float8) OWNER TO $DATABASE_USER;"
            envFrom: *envFrom
        containers:
          app:
            image:
              repository: teslamate/teslamate
              tag: 4.0.1@sha256:e77ec65007aafb40d736ed2c89675112fe8d960886ea9d7de3255f2b5360269f
            env:
              TZ: ${TIMEZONE}
              PORT: &port 80
              DISABLE_MQTT: "false"
              TESLA_API_HOST: https://fleet-api.prd.eu.vn.cloud.tesla.com
              TESLA_AUTH_HOST: https://auth.tesla.com
              TESLA_AUTH_PATH: /oauth2/v3
              # Reduce Tesla Fleet API polling to avoid EXCEEDED_LIMIT (default 15/21)
              SUSPEND_AFTER_IDLE_MIN: "5"
              SUSPEND_MIN: "60"
            envFrom: *envFrom
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health_check
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 512Mi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https

    persistence:
      tmp:
        type: emptyDir
