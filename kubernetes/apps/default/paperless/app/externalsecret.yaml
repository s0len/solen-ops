---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: paperless-secret
    template:
      data:
        PAPERLESS_ADMIN_USER: "{{ .PAPERLESS_ADMIN_USER }}"
        PAPERLESS_ADMIN_PASSWORD: "{{ .PAPERLESS_ADMIN_PASSWORD }}"
        PAPERLESS_SECRET_KEY: "{{ .PAPERLESS_SECRET_KEY }}"
        PAPERLESS_REDIS: "redis://dragonfly.database.svc.cluster.local:6379/6"
        PAPERLESS_DBHOST: "postgres16-rw.database.svc.cluster.local"
        PAPERLESS_DBPORT: "5432"
        PAPERLESS_DBUSER: &dbuser "{{ .PAPERLESS_POSTGRES_USER }}"
        PAPERLESS_DBPASS: &dbpass "{{ .PAPERLESS_POSTGRES_PASSWORD }}"
        PAPERLESS_DBNAME: &dbname "{{ .PAPERLESS_POSTGRES_DB }}"
        INIT_POSTGRES_DBNAME: *dbname
        INIT_POSTGRES_HOST: postgres16-rw.database.svc.cluster.local
        INIT_POSTGRES_USER: *dbuser
        INIT_POSTGRES_PASS: *dbpass
        INIT_POSTGRES_SUPER_PASS: "{{ .CNPG_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: cloudnative-pg
      rewrite:
        - regexp:
            source: "(.*)"
            target: "CNPG_$1"
    - extract:
        key: paperless
      rewrite:
        - regexp:
            source: "(.*)"
            target: "PAPERLESS_$1"
