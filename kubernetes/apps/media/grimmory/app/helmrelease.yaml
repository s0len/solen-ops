---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app grimmory
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3

  values:
    controllers:
      grimmory:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: lscr.io/linuxserver/mariadb
              tag: 11.4.5@sha256:df34ab028c29a5317759e4ee308b5a41bef46df3f5c6da1ce0f143cab075bae3
            command: ["bash", "-c"]
            args:
              - |
                echo "Starting MariaDB for init check..."
                until mariadb-admin ping -h localhost --silent; do
                  sleep 1
                done
                echo "MariaDB is ready"
            envFrom: &envFrom
              - secretRef:
                  name: grimmory-secret
            restartPolicy: Always
        containers:
          app:
            image:
              repository: ghcr.io/grimmory-tools/grimmory
              tag: v2.3.0@sha256:62ba6f7a3e84ce6188de645c9965fa45a7913b6bfcaf9e2e0df2da0d2466a51a
            env:
              TZ: ${TIMEZONE}
              DISK_TYPE: NETWORK
              SWAGGER_ENABLED: "false"
            envFrom: *envFrom
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: &port 6060
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 512Mi
              limits:
                memory: 2Gi
          mariadb:
            image:
              repository: lscr.io/linuxserver/mariadb
              tag: 11.4.5@sha256:df34ab028c29a5317759e4ee308b5a41bef46df3f5c6da1ce0f143cab075bae3
            env:
              TZ: ${TIMEZONE}
            envFrom: *envFrom
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 512Mi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https

    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /app/data

      mariadb-data:
        type: emptyDir
        advancedMounts:
          grimmory:
            mariadb:
              - path: /config
            init-db:
              - path: /config

      books:
        type: nfs
        server: ${TRUENAS_IP}
        path: /mnt/rust/data/media/books
        globalMounts:
          - path: /books

      tmp:
        type: emptyDir
