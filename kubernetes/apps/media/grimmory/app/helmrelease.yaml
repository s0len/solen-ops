---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app grimmory
  namespace: media
spec:
  interval: 30m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    timeout: 15m
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      grimmory:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          # ServiceAccount token not needed; chart 5.0.0 default is false anyway
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        initContainers:
          mariadb:
            image:
              repository: docker.io/library/mariadb
              tag: 12.2.2
            env:
              MARIADB_DATABASE: grimmory
              MARIADB_USER: grimmory
              MARIADB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: grimmory-secret
                    key: DATABASE_PASSWORD
              MARIADB_ROOT_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: grimmory-secret
                    key: MYSQL_ROOT_PASSWORD
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - bash
                      - -c
                      - |-
                        mariadb-admin ping --socket=/run/mysqld/mysqld.sock --user=root --password=$${MARIADB_ROOT_PASSWORD}
            restartPolicy: Always
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
              seccompProfile: { type: RuntimeDefault }
          wait-for-mariadb:
            image:
              repository: docker.io/library/mariadb
              tag: 12.2.2
            command:
              - bash
              - -c
              - |
                until mariadb-admin ping --socket=/run/mysqld/mysqld.sock --user=root --password=$${MARIADB_ROOT_PASSWORD} 2>/dev/null; do
                  echo "Waiting for MariaDB..."
                  sleep 2
                done
            env:
              MARIADB_ROOT_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: grimmory-secret
                    key: MYSQL_ROOT_PASSWORD
        containers:
          grimmory:
            image:
              repository: ghcr.io/grimmory-tools/grimmory
              tag: v3.0.3@sha256:a903a2b44c308bd1738b6f7cdb5a2e5a2a1ae23a092f30eb68581e2be1af50cd
            env:
              TZ: ${TIMEZONE}
              DISK_TYPE: NETWORK
              SWAGGER_ENABLED: "false"
              DATABASE_URL: jdbc:mariadb://localhost:3306/grimmory
              DATABASE_USERNAME: grimmory
              DATABASE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: grimmory-secret
                    key: DATABASE_PASSWORD
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: &port 6060
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 1Gi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
    persistence:
      data:
        existingClaim: *app
        advancedMounts:
          grimmory:
            grimmory:
              - path: /app/data
                subPath: app
            mariadb:
              - path: /var/lib/mysql
                subPath: mysql
      nfs-data:
        type: nfs
        server: ${TRUENAS_IP}
        path: /mnt/rust/data
        advancedMounts:
          grimmory:
            grimmory:
              - path: /data
      mysqld:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Mi
        advancedMounts:
          grimmory:
            mariadb:
              - path: /run/mysqld
            wait-for-mariadb:
              - path: /run/mysqld
      tmp:
        type: emptyDir
        advancedMounts:
          grimmory:
            grimmory:
              - path: /tmp
                subPath: app
            mariadb:
              - path: /tmp
                subPath: mysql
