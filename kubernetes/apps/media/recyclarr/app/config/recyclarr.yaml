# yaml-language-server: $schema=https://schemas.recyclarr.dev/v8/config-schema.json

###################################################################################################
# Recyclarr Configuration: Migrated to v8 guide-backed quality profiles                          #
# Updated: 2026-03-13                                                                            #
# Documentation: https://recyclarr.dev                                                           #
###################################################################################################

# Configuration specific to Sonarr
sonarr:
  sonarr:
    base_url: http://sonarr.media.svc.cluster.local
    api_key: !env_var SONARR_API_KEY

    delete_old_custom_formats: true

    media_naming:
      series: plex-tvdb
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default

    quality_definition:
      type: series

    quality_profiles:
      # Guide-backed WEB-1080p profile
      - trash_id: 72dae194fc92bf828f32cde7744e51a1  # WEB-1080p
        reset_unmatched_scores:
          enabled: true
          except:
            - "Personal Good Swedish Release Groups"

      # Guide-backed WEB-2160p profile
      - trash_id: d1498e7d189fbe6c7110ceaabb7473e6  # WEB-2160p
        reset_unmatched_scores:
          enabled: true
        qualities:
          - name: WEB 1080p
            enabled: true
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p

      # Guide-backed Anime Remux-1080p profile
      - trash_id: 20e0fc959f1f1704bed501f23bdae76f  # [Anime] Remux-1080p
        reset_unmatched_scores:
          enabled: true

      # Custom Swedish profile for kids content (not guide-backed)
      - name: Swedish
        reset_unmatched_scores:
          enabled: true
          except:
            - Swedish
            - "Personal Good Swedish Release Groups"
        qualities:
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: Bluray-1080p
          - name: HDTV-1080p
          - name: WEB 720p
            qualities:
              - WEBRip-720p
              - WEBDL-720p
          - name: HDTV-720p

    custom_format_groups:
      add:
        # Golden Rule HD for WEB-1080p and Swedish
        - trash_id: 158188097a58d7687dee647e04af0da3  # [Required] Golden Rule HD
          assign_scores_to:
            - trash_id: 72dae194fc92bf828f32cde7744e51a1  # WEB-1080p
            - name: Swedish
        # Golden Rule UHD for WEB-2160p
        - trash_id: e3f37512790f00d0e89e54fe5e790d1c  # [Required] Golden Rule UHD
        # DV Boost for WEB-2160p
        - trash_id: e0b2774083df4265f25c9e5bc6c80940  # [HDR Formats] DV Boost
        # DV (w/o HDR fallback) for WEB-2160p
        - trash_id: d776a1ea912a117d66d83b880ff2055d  # [HDR Formats] DV (w/o HDR fallback)
        # SDR block for WEB-2160p
        - trash_id: e1053c0ef622df3749fa43c22865663a  # [Optional] SDR
          select:
            - 2016d1676f5ee13a5b7257ff86ac9a93  # SDR
        # Optional miscellaneous for WEB-1080p and Swedish
        - trash_id: f4a0410a1df109a66d6e47dcadcce014  # [Optional] Miscellaneous
          assign_scores_to:
            - trash_id: 72dae194fc92bf828f32cde7744e51a1  # WEB-1080p
            - name: Swedish
          select:
            - 32b367365729d530ca1c124a0b180c64  # Bad Dual Groups
            - 82d40da2bc6923f41e14394075dd4b03  # No-RlsGroup
            - e1a997ddb54e3ecbfe06341ad323c458  # Obfuscated

    # Custom formats for overrides not handled by guide groups
    custom_formats:
      # Swedish content scoring
      - trash_ids:
          - eb3d5cc0a2be0db205fb823640db6a3c # Not Swedish
        assign_scores_to:
          - name: Swedish
            score: 7000

      # Retags for WEB-2160p
      - trash_ids:
          - 06d66ab109d4d2eddb2794d21526d140 # Retags
          - 1b3994c551cbb92a2c781af061f4ab44 # Scene
        assign_scores_to:
          - name: WEB-2160p

      # x265 (HD) allow for WEB-1080p and Swedish
      - trash_ids:
          - 47435ece6b99a0b477caf360e79ba0bb # x265 (HD)
        assign_scores_to:
          - name: WEB-1080p
            score: 0
          - name: Swedish
            score: 0
      - trash_ids:
          - 9b64dff695c2115facf1b6ea59c9bd07 # x265 (no HDR/DV)
        assign_scores_to:
          - name: WEB-1080p
          - name: Swedish

      # Anime-specific custom format overrides
      - trash_ids:
          - 026d5aadd1a6b4e550b134cb6c72b3ca # Uncensored
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 0

      - trash_ids:
          - b2550eb333d27b75833e25b8c2557b38 # 10bit
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 0

      - trash_ids:
          - 418f50b10f1907201b6cfdf881f467b7 # Anime Dual Audio
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 0

# Configuration specific to Radarr
radarr:
  radarr-anime:
    base_url: http://radarr-anime.media.svc.cluster.local
    api_key: !env_var RADARR_API_KEY

    delete_old_custom_formats: true

    media_naming:
      folder: plex-tmdb
      movie:
        rename: true
        standard: plex-anime-tmdb

    quality_definition:
      type: anime

    quality_profiles:
      - trash_id: 722b624f9af1e492284c4bc842153a38  # [Anime] Remux-1080p
        reset_unmatched_scores:
          enabled: true

    # Anime-specific custom format overrides
    custom_formats:
      - trash_ids:
          - 064af5f084a0a24458cc8ecd3220f93f # Uncensored
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 0

      - trash_ids:
          - a5d148168c4506b55cf53984107c396e # 10bit
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 0

      - trash_ids:
          - 4a3b087eea2ce012fcc1ce319259a3be # Anime Dual Audio
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 0

  radarr-standard:
    base_url: http://radarr-standard.media.svc.cluster.local
    api_key: !env_var RADARR_API_KEY

    delete_old_custom_formats: true

    media_naming:
      folder: plex-tmdb
      movie:
        rename: true
        standard: plex-tmdb

    quality_definition:
      type: sqp-uhd

    quality_profiles:
      # Guide-backed SQP-2
      - trash_id: c3933358ba2356bafc41524f81471069  # [SQP] SQP-2
        reset_unmatched_scores:
          enabled: true

      # Guide-backed SQP-3 (Audio) -- using the Audio variant per discord recommendation
      # https://discord.com/channels/492590071455940612/1385343352563826748
      - trash_id: 0ada8e60cc3ddf2733b65de10f4a6c72  # [SQP] SQP-3 (Audio)
        reset_unmatched_scores:
          enabled: true

      # Guide-backed SQP-4
      - trash_id: 013f89e6da27519fe56cf482702a2db9  # [SQP] SQP-4
        reset_unmatched_scores:
          enabled: true

    custom_format_groups:
      add:
        # Required Golden Rule UHD for all SQP profiles
        - trash_id: ff204bbcecdd487d1cefcefdbf0c278d  # [Required] Golden Rule UHD
        # DV Boost
        - trash_id: 1616617ab3a14397a2b2321bcbda44d1  # [HDR Formats] DV Boost
        # DV (w/o HDR fallback) block
        - trash_id: 7fc2751eef7e6bdc70b74136e5e35c76  # [HDR Formats] DV (w/o HDR fallback)
        # Movie Versions
        - trash_id: f4f1474b963b24cf983455743aa9906c  # [Optional] Movie Versions
          select:
            - 0f12c086e289cf966fa5948eac571f44  # Hybrid
            - 570bc9ebecd92723d2d21500f4be314c  # Remaster
            - eca37840c13c6ef2dd0262b141a5482f  # 4K Remaster
            - e0c07d59beb37348e975a930d5e50319  # Criterion Collection
            - 9d27d9d2181838f76dee150882bdc58c  # Masters of Cinema
            - db9b4c4b53d312a3ca5f1378f6440fc9  # Vinegar Syndrome
            - 957d0f44b592285f26449575e8b1167e  # Special Edition
            - eecf3a857724171f968a66cb5719e152  # IMAX
            - 9f6cbff8cfe4ebbc1bde14c7b7bec0de  # IMAX Enhanced
        # SDR block
        - trash_id: 47f0d69750de9e16855915fa73bb7b08  # [Optional] SDR
          select:
            - 9c38ebb7384dada637be8899efa68e6f  # SDR
        # Miscellaneous SQP
        - trash_id: c4492eebd0c2ddc14c2c91623aa7f95d  # [Optional] Miscellaneous SQP
          select:
            - b6832f586342ef70d9c128d40c07b872  # Bad Dual Groups
            - cc444569854e9de0b084ab2b8b1532b2  # Black and White Editions
            - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5  # No-RlsGroup
            - 7357cf5161efbf8c4d5d0c30b4815ee2  # Obfuscated
            - 5c44f52a8714fdd79bb4d98e2673be1f  # Retags
            - f537cf427b64c38c8e36298f657e4828  # Scene
            - f700d29429c023a5734505e77daeaea7  # DV (Disk)

    # Custom format overrides for specific profiles
    custom_formats:
      # x264 allowed for SQP-2 and SQP-4
      - trash_ids:
          - 2899d84dc9372de3408e6d8cc18e9666 # x264
        assign_scores_to:
          - name: SQP-2
            score: 0
          - name: SQP-4
            score: 0

      # x265 (HD) allowed for SQP-2
      - trash_ids:
          - dc98083864ea246d05a42df0d05f81cc # x265 (HD)
        assign_scores_to:
          - name: SQP-2
          - name: SQP-3
          - name: SQP-4

      # x265 (no HDR/DV) score 0 for SQP-2 and SQP-3
      - trash_ids:
          - 839bea857ed2c0a8e084f3cbdbd65ecb # x265 (no HDR/DV)
        assign_scores_to:
          - name: SQP-2
            score: 0
          - name: SQP-3
            score: 0

      # SQP-3 release group boosts
      - trash_ids:
          - 5153ec7413d9dae44e24275589b5e944 # BHDStudio
          - e098247bc6652dd88c76644b275260ed # FLUX
          - ff5bc9e8ce91d46c997ca3ac6994d6f8 # FraMeSToR
          - 7a0d1ad358fee9f5b074af3ef3f9d9ef # hallowed
          - d66d26d37c32b0137cd26f42abaa7c2e # TheFarm
        assign_scores_to:
          - name: SQP-3

  radarr-kids:
    base_url: http://radarr-kids.media.svc.cluster.local
    api_key: !env_var RADARR_API_KEY

    delete_old_custom_formats: true

    media_naming:
      folder: plex-tmdb
      movie:
        rename: true
        standard: plex-tmdb

    quality_definition:
      type: sqp-streaming

    quality_profiles:
      - trash_id: 0896c29d74de619df168d23b98104b22  # [SQP] SQP-1 (1080p)
        reset_unmatched_scores:
          enabled: true
          except:
            - Swedish
        min_format_score: 7000

    custom_format_groups:
      add:
        # Movie Versions - IMAX Enhanced for kids
        - trash_id: f4f1474b963b24cf983455743aa9906c  # [Optional] Movie Versions
          select:
            - 9f6cbff8cfe4ebbc1bde14c7b7bec0de  # IMAX Enhanced
