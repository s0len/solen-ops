---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-gpu-resource-driver
spec:
  chartRef:
    kind: OCIRepository
    name: intel-gpu-resource-driver
  interval: 1h
  values:
    image:
      repository: ghcr.io/intel/intel-resource-drivers-for-kubernetes
    kubeletPlugin:
      # v0.10.0 moved health monitoring to a separate xpumd daemon that we don't
      # deploy. Disable it and read hardware details directly from sysfs instead.
      privileged: true
      healthMonitoring:
        enabled: false
    cdi:
      staticPath: /var/cdi/static
      dynamicPath: /var/cdi/dynamic
