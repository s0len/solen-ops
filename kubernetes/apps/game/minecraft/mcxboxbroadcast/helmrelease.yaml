---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mcxboxbroadcast
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template

  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        runAsNonRoot: true
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      mcxboxbroadcast:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          seed-config:
            image:
              repository: busybox
              tag: "1.37"
            command:
              - sh
              - -c
              - |
                if [ ! -f /opt/app/config/config.yml ]; then
                  cp /config-seed/config.yml /opt/app/config/config.yml
                  echo "Seeded default config.yml"
                else
                  echo "config.yml already exists, leaving it alone"
                fi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

        containers:
          app:
            image:
              repository: ghcr.io/mcxboxbroadcast/standalone
              tag: latest@sha256:77cdce76a622180328063601a5fe17c11eaefca786dbf1073e05b1d45afea111
            env:
              TZ: ${TIMEZONE}
            resources:
              limits:
                cpu: 500m
                memory: 1Gi
              requests:
                cpu: 10m
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    persistence:
      config:
        existingClaim: mcxboxbroadcast-config
        globalMounts:
          - path: /opt/app/config

      config-seed:
        type: configMap
        name: mcxboxbroadcast-configmap
        advancedMounts:
          mcxboxbroadcast:
            seed-config:
              - path: /config-seed
                readOnly: true

      tmp:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
