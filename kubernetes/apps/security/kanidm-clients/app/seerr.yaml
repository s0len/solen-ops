---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kanidm-client-seerr
  namespace: security
  labels:
    kanidm_config: "1"
data:
  targetNamespace: media
  client.json: |
    {
      "systems": {
        "oauth2": {
          "seerr": {
            "displayName": "Seerr",
            "originUrl": "https://request.uniflix.vip/api/v1/auth/oidc-callback",
            "originLanding": "https://request.uniflix.vip/",
            "preferShortUsername": true,
            "scopeMaps": {
              "users": ["openid", "profile", "email", "groups"]
            },
            "k8s": {
              "imageUrl": "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/seerr.svg"
            }
          }
        }
      }
    }
