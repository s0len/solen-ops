---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app nut-shutdown-ups-a
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: nut-shutdown-ups-a
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      nut-shutdown-ups-a:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          talosctl:
            image:
              repository: alpine
              tag: "3.23"
            command:
              - sh
              - -c
              - wget -qO /shared/talosctl "https://github.com/siderolabs/talos/releases/download/v1.13.3/talosctl-linux-amd64" && chmod +x /shared/talosctl
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
        containers:
          app:
            image:
              repository: docker.io/instantlinux/nut-upsd
              tag: 2.8.2-r0@sha256:33c4d8c1f9907f6044b1b01130b9ed191e79b954792da68276f335c976ebca20
            command: [sh, /app/poll.sh]
            env:
              TZ: ${TIMEZONE}
              TALOS_NODE: "192.168.10.41"   # control-1 (its own apid)
              UPS_NAME: "ups@localhost"     # nut-server-ups-a on the same node (hostNetwork)
              SHUTDOWN_PERCENT: "15"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 64Mi
    defaultPodOptions:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: control-1
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
    persistence:
      script:
        type: configMap
        name: nut-shutdown-ups-a-script
        globalMounts:
          - path: /app/poll.sh
            subPath: poll.sh
            readOnly: true
      talosconfig:
        type: secret
        name: nut-shutdown-ups-a-secret
        globalMounts:
          - path: /talos/config
            subPath: config
            readOnly: true
      shared:
        type: emptyDir
        globalMounts:
          - path: /shared
