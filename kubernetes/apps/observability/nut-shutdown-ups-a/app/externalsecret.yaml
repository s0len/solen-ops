---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nut-shutdown-ups-a
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: nut-shutdown-ups-a-secret
    template:
      data:
        # talosconfig with shutdown rights — same 1Password item talos-shutdown uses
        config: "{{ .talosconfig }}"
  data:
    - secretKey: talosconfig
      remoteRef:
        key: talos-shutdown
        property: TALOSCONFIG
