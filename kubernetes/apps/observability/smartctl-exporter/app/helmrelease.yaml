---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app smartctl-exporter
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: smartctl-exporter
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: kube-prometheus-stack
      namespace: observability
  values:
    fullnameOverride: *app
    config:
      # Use regex include so we catch ALL NVMe namespaces, not just nvme0n1.
      # Previously /dev/nvme0n1 only — that missed nvme1n1 on control-1
      # (where osd.2 lives), so its thermal events went unmonitored.
      device_include: ^/dev/(nvme[0-9]+n[0-9]+|sd[a-z]+)$
    serviceMonitor:
      enabled: true
    prometheusRules:
      enabled: false
