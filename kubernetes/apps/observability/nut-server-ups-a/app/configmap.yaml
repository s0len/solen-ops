---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nut-server-ups-a-config
data:
  ups.conf: |
    # UPS A: powers control-1 + the fiber. USB on control-1 (06da:ffff, PPC HID UPS).
    # HID Power Device Class → usbhid-ups (MGE HID subdriver), not nutdrv_qx.
    [ups]
        driver = usbhid-ups
        port = auto
        desc = "UPS A - control-1 + fiber"
        vendorid = 06da
        productid = ffff
        pollinterval = 15
        # Report LOWBATT at 30% so the local upsmon shuts control-1 down at 30% (step 4).
        override.battery.charge.low = 30
