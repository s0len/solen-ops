---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/volsync.backube/kopiamaintenance_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: daily
spec:
  enabled: true
  suspend: false
  trigger:
    schedule: "30 3,15 * * *"
  moverVolumes:
    - mountPath: repository
      volumeSource:
        nfs:
          path: /mnt/rust/volsync/kopia
          server: 192.168.10.98
  repository:
    repository: volsync-maintenance-secret
  # Match repo ownership (568); maintenance defaults to UID 1000 and can't read the repo.
  podSecurityContext:
    runAsUser: 568
    runAsGroup: 568
    fsGroup: 568
    runAsNonRoot: true
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      memory: 12Gi
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
