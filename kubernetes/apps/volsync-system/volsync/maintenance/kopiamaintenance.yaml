---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/volsync.backube/kopiamaintenance_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: daily
spec:
  enabled: true
  suspend: false
  trigger:
    schedule: "30 3,15 * * *"
  moverVolumes:
    - mountPath: repository
      volumeSource:
        nfs:
          path: /mnt/rust/volsync/kopia
          server: 192.168.10.98
  repository:
    repository: volsync-maintenance-secret
  # The kopia repo on NFS is owned 568:568 (backup movers run as UID 568 via
  # moverSecurityContext in components/volsync-kopia/replicationsource.yaml).
  # Maintenance defaults to UID 1000, which can't read the 568-owned 0600 repo
  # config blobs -> "open /mnt/repository/.shards: permission denied".
  # Run maintenance as 568 to match repo ownership.
  podSecurityContext:
    runAsUser: 568
    runAsGroup: 568
    fsGroup: 568
    runAsNonRoot: true
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      memory: 12Gi
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
