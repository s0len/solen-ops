---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: volsync-maintenance
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: volsync-maintenance-secret
    template:
      data:
        # Reuses RESTIC_PASSWORD from the same 1P item the per-app
        # secrets use — single password protects the shared kopia repo.
        KOPIA_PASSWORD: "{{ .RESTIC_PASSWORD }}"
        KOPIA_REPOSITORY: filesystem:///mnt/repository
  dataFrom:
    - extract:
        key: volsync
