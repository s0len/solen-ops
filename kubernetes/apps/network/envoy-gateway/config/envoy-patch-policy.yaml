---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyPatchPolicy
metadata:
  name: authelia-forwarded-headers
  namespace: network
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: envoy-external
  type: JSONPatch
  jsonPatches:
    - type: "type.googleapis.com/envoy.config.listener.v3.Listener"
      name: network/envoy-external/https
      operation:
        op: add
        path: "/filter_chains/0/filters/0/typed_config/http_filters/0"
        value:
          name: envoy.filters.http.lua
          typed_config:
            "@type": "type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua"
            default_source_code:
              inline_string: |
                function envoy_on_request(request_handle)
                  local headers = request_handle:headers()
                  local path = headers:get(":path")
                  local method = headers:get(":method")
                  local host = headers:get(":authority")
                  headers:add("X-Forwarded-URI", path)
                  headers:add("X-Forwarded-Method", method)
                  headers:add("X-Forwarded-Host", host)
                  headers:add("X-Forwarded-Port", "443")
                  local xff = headers:get("x-forwarded-for")
                  if xff then
                    local client = xff:match("^%s*([^,%s]+)")
                    if client then
                      headers:add("X-Real-IP", client)
                    end
                  end
                end
