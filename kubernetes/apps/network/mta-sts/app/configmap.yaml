---
# MTA-STS policy for svenss.one (Migadu mail).
# Spec: https://datatracker.ietf.org/doc/html/rfc8461
# Body MUST be served as text/plain with LF line endings.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mta-sts-policy
data:
  mta-sts.txt: |
    version: STSv1
    mode: enforce
    mx: aspmx1.migadu.com
    mx: aspmx2.migadu.com
    max_age: 604800
